services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/stainer1998/vf-admin-api:latest
    command: >
      bash -c "python manage.py migrate --no-input &&
               python manage.py collectstatic --no-input &&
               gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120"
    working_dir: /app/backend
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE}
      SECRET_KEY: ${SECRET_KEY}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
      JWT_ACCESS_TOKEN_LIFETIME: ${JWT_ACCESS_TOKEN_LIFETIME}
      JWT_REFRESH_TOKEN_LIFETIME: ${JWT_REFRESH_TOKEN_LIFETIME}
    volumes:
      - static_files:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ghcr.io/stainer1998/vf-admin-frontend:latest
    restart: unless-stopped

  nginx:
    image: ghcr.io/stainer1998/vf-admin-nginx:latest
    ports:
      - "8090:80"
    volumes:
      - static_files:/static:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped

volumes:
  mysql_data:
  static_files:
