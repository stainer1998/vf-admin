name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ghcr.io/stainer1998/vf-admin-api:latest
            ghcr.io/stainer1998/vf-admin-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: frontend/Dockerfile.prod
          push: true
          build-args: VITE_API_URL=/
          tags: |
            ghcr.io/stainer1998/vf-admin-frontend:latest
            ghcr.io/stainer1998/vf-admin-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          file: nginx/Dockerfile
          push: true
          tags: |
            ghcr.io/stainer1998/vf-admin-nginx:latest
            ghcr.io/stainer1998/vf-admin-nginx:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}

      - name: Deploy with docker compose
        run: |
          docker compose -f docker-compose.prod.yml --env-file /opt/vf-admin/.env.prod pull
          docker compose -f docker-compose.prod.yml --env-file /opt/vf-admin/.env.prod up -d
